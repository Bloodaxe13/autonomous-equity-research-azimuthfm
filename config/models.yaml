models:
  lead_analyst:
    purpose: orchestration, synthesis, report writing
    prompt_file: prompts/lead_analyst.md
    temperature: 0.2
    reasoning_effort: high
    capabilities:
      - run_subagent
      - code_execution
      - web_search
      - memory_write
      - memory_read
      - complete_task
  research_subagent:
    purpose: single-facet evidence gathering and structured finding compression
    prompt_file: prompts/research_subagent.md
    temperature: 0.1
    reasoning_effort: medium
    capabilities:
      - web_search
      - web_fetch
      - complete_task
  red_team:
    purpose: independent adversarial review of completed report
    prompt_file: prompts/red_team.md
    temperature: 0.1
    reasoning_effort: medium
    capabilities:
      - complete_task
  citation:
    purpose: claim-level attribution and computation-log attachment
    prompt_file: prompts/citation.md
    temperature: 0.0
    reasoning_effort: low
    capabilities:
      - complete_task
routing:
  initiation: lead_analyst
  quarterly: lead_analyst
  flash: lead_analyst
notes:
  - Update concrete model IDs at deployment time without changing the role contracts.
  - Preserve prompt files and schemas as the stable interface layer even if model vendors change.
